

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GPT Plus Redeem Note Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      --card: rgba(255, 255, 255, .06);
      --border: rgba(255, 255, 255, .15);
      --accent: #7c4dff;
      --accent-hover: #8f6aff;
      --text: #eee;
      --muted: #bbb;
      --success: #7ee2a8;
    }

    * {
      box-sizing: border-box;
      font-family: Inter, system-ui, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 620px;
      width: 100%;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .35);
    }

    h1 {
      text-align: center;
      margin: 0 0 24px;
      font-size: clamp(22px, 5vw, 30px);
    }

    .group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: var(--muted);
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, .25);
      color: #fff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent-hover);
      box-shadow: 0 0 0 3px rgba(124, 77, 255, .2);
    }

    select option {
      color: #111;
    }

    textarea {
      resize: vertical;
      font-family: Consolas, "Courier New", monospace;
      line-height: 1.5;
    }

    #kode {
      min-height: 150px;
    }

    #hasil {
      min-height: 560px;
    }

    .field-info {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .counter {
      color: var(--success);
      font-weight: 700;
      white-space: nowrap;
    }

    .warranty-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }

    button:hover {
      background: var(--accent-hover);
    }

    button:active {
      transform: translateY(1px);
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .actions button {
      flex: 1;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .card {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>🎁 GPT Plus Redeem Note</h1>

      <div class="group">
        <label for="tgl">Tanggal Pembelian</label>
        <input type="date" id="tgl">
      </div>

      <div class="group">
        <label for="modeInput">Jenis Input</label>
        <select id="modeInput">
          <option value="redeem">Kode Redeem (Bulk)</option>
          <option value="akun">Akun Microsoft — Email | Password</option>
        </select>
      </div>

      <div class="group">
        <label for="kode" id="inputLabel">Kode Redeem (Bulk)</label>
        <textarea id="kode" spellcheck="false" placeholder="EUR-XXXXXXXXXX&#10;EUR-XXXXXXXXXX&#10;EUR-XXXXXXXXXX"></textarea>
        <div class="field-info">
          <span id="inputInfo">Pisahkan kode dengan Enter, spasi, koma, atau titik koma.</span>
          <span class="counter" id="jumlahKode" aria-live="polite">0 kode</span>
        </div>
      </div>

      <div class="group">
        <label for="region">Channel / Region Akun</label>
        <input id="region" list="regionList" value="Brazil" placeholder="Ketik region atau channel kustom">
        <datalist id="regionList">
          <option value="Brazil">
          <option value="India">
          <option value="Eropa">
          <option value="Indonesia">
        </datalist>
      </div>

      <div class="group">
        <label for="garansiJumlah" id="garansiLabel">Garansi Redeem</label>
        <div class="warranty-row">
          <input type="number" id="garansiJumlah" value="1" min="1" step="1" inputmode="numeric" aria-label="Jumlah garansi">
          <select id="garansiSatuan" aria-label="Satuan garansi">
            <option value="Jam">Jam</option>
            <option value="Hari">Hari</option>
          </select>
        </div>
      </div>

      <button type="button" onclick="generate()">Generate Nota</button>
    </section>

    <section class="card hidden" id="hasilCard" style="margin-top: 18px">
      <label for="hasil">Nota</label>
      <textarea id="hasil" readonly></textarea>
      <div class="actions">
        <button type="button" onclick="copyText()" id="copyBtn">Salin</button>
        <button type="button" onclick="editNota()" id="editBtn">Edit</button>
      </div>
    </section>
  </main>

  <script>
    const tanggalInput = document.getElementById("tgl");
    const kodeInput = document.getElementById("kode");
    const jumlahKode = document.getElementById("jumlahKode");
    const modeInput = document.getElementById("modeInput");
    let edit = false;

    tanggalInput.valueAsDate = new Date();

    function getCodes() {
      return kodeInput.value
        .split(/[\s,;]+/)
        .map(kode => kode.trim())
        .filter(Boolean);
    }

    function getAccounts() {
      return kodeInput.value
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
          const parts = line.split("|").map(part => part.trim());
          return {
            email: parts[0] || "",
            password: parts[1] || "",
            valid: parts.length === 2 && parts[0] && parts[1]
          };
        });
    }

    function isAccountMode() {
      return modeInput.value === "akun";
    }

    function updateCount() {
      const total = isAccountMode() ? getAccounts().length : getCodes().length;
      jumlahKode.textContent = `${total} ${isAccountMode() ? "akun" : "kode"}`;
    }

    kodeInput.addEventListener("input", updateCount);

    modeInput.addEventListener("change", () => {
      const akun = isAccountMode();
      document.getElementById("inputLabel").textContent = akun
        ? "Akun Microsoft (Bulk)"
        : "Kode Redeem (Bulk)";
      document.getElementById("inputInfo").textContent = akun
        ? "Satu akun per baris dengan format: email | password"
        : "Pisahkan kode dengan Enter, spasi, koma, atau titik koma.";
      document.getElementById("garansiLabel").textContent = akun
        ? "Garansi Akun"
        : "Garansi Redeem";
      kodeInput.placeholder = akun
        ? "akun1@outlook.com | Password123\nakun2@hotmail.com | Password456"
        : "EUR-XXXXXXXXXX\nEUR-XXXXXXXXXX\nEUR-XXXXXXXXXX";
      kodeInput.value = "";
      updateCount();
    });

    function formatDate(value) {
      if (!value) return "-";
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day).toLocaleDateString("id-ID", {
        day: "numeric",
        month: "long",
        year: "numeric"
      });
    }

    function generate() {
      const akunMode = isAccountMode();
      const items = akunMode ? getAccounts() : getCodes();

      if (items.length === 0) {
        alert(akunMode ? "Masukkan minimal 1 akun Microsoft." : "Masukkan minimal 1 kode redeem.");
        kodeInput.focus();
        return;
      }

      if (akunMode && items.some(account => !account.valid)) {
        alert("Format akun belum sesuai. Gunakan satu akun per baris: email | password");
        kodeInput.focus();
        return;
      }

      const tgl = formatDate(tanggalInput.value);
      const region = document.getElementById("region").value.trim() || "-";
      const garansiJumlahInput = document.getElementById("garansiJumlah");
      const garansiJumlah = Math.max(1, parseInt(garansiJumlahInput.value, 10) || 1);
      const garansiSatuan = document.getElementById("garansiSatuan").value;
      const daftarItem = akunMode
        ? items.map((account, index) => `#Akun_${index + 1}\nEmail    : ${account.email}\nPassword : ${account.password}`).join("\n\n")
        : items.map((kode, index) => `${index + 1}. ${kode}`).join("\n");

      garansiJumlahInput.value = garansiJumlah;

      const txt = `PESANAN GPT PLUS PRIVATE ${akunMode ? "BERHASIL" : "REDEEM BERHASIL"}
━━━━━━━━━━━━━━━━━━

Tanggal Pembelian  : ${tgl}
Jumlah ${akunMode ? "Akun" : "Kode"}        : ${items.length}
Channel / Region   : ${region}
Garansi ${akunMode ? "Akun" : "Redeem"}     : ${garansiJumlah} ${garansiSatuan}

${akunMode ? "Data Akun Microsoft" : "Kode Redeem"}:
${daftarItem}
━━━━━━━━━━━━━━━━━━

📌 CARA KLAIM
${akunMode ? "Akun sudah diredeem. Tidak perlu melakukan proses redeem lagi.\nBuka tutorial berikut dan langsung mulai dari STEP 4 untuk mengamankan akun:" : "Ikuti panduan klaim berikut:"}
https://babayshop.id/gpt/redeem-acc
━━━━━━━━━━━━━━━━━━

⚠️ INFORMASI PENTING
• Segera amankan akun email Microsoft dan akun ChatGPT karena keduanya 100% menjadi milik Anda.
• Codex sudah terverifikasi dan siap digunakan.
━━━━━━━━━━━━━━━━━━

📜 SYARAT & KETENTUAN
• Garansi hanya berlaku ${garansiJumlah} ${garansiSatuan} ${akunMode ? "untuk login dan mengamankan akun" : "untuk proses redeem"}.
• ${akunMode ? "Setelah akun berhasil diamankan" : "Setelah redeem berhasil"}, transaksi dinyatakan selesai.
• Tidak ada jaminan permanen. Sewaktu-waktu akun dapat terkena take down, suspend ataupun banned oleh pihak OpenAI.
• Hal tersebut berada di luar tanggung jawab kami.
• Membeli = memahami dan menyetujui seluruh ketentuan.
• Jika ingin lebih aman tanpa kendala, silakan berlangganan resmi melalui OpenAI.
━━━━━━━━━━━━━━━━━━

Terima kasih telah mempercayai BabayShop ❤️`;

      document.getElementById("hasil").value = txt;
      document.getElementById("hasilCard").classList.remove("hidden");
      document.getElementById("hasilCard").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    async function copyText() {
      const textarea = document.getElementById("hasil");
      const copyBtn = document.getElementById("copyBtn");

      try {
        await navigator.clipboard.writeText(textarea.value);
      } catch (error) {
        textarea.select();
        document.execCommand("copy");
      }

      copyBtn.textContent = "Tersalin";
      setTimeout(() => {
        copyBtn.textContent = "Salin";
      }, 1500);
    }

    function editNota() {
      edit = !edit;
      const textarea = document.getElementById("hasil");
      const editBtn = document.getElementById("editBtn");

      if (edit) {
        textarea.removeAttribute("readonly");
        textarea.focus();
        editBtn.textContent = "Selesai";
      } else {
        textarea.setAttribute("readonly", "readonly");
        editBtn.textContent = "Edit";
      }
    }
  </script>

</body>
</html>
