<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menghubungkan ke WhatsApp...</title>

    <script>
        window.onload = function () {
            const nomor = "6281523984574";
            const pesan = encodeURIComponent(
                "Halo Admin Babay\n\n" +
                "Saya telah mengakses website sehingga berhasil menghubungimu.\n\n" +
                "Ada yang ingin saya tanyakan nih..."
            );

            window.location.href = `https://wa.me/${nomor}?text=${pesan}`;
        };
    </script>

    <style>
        body{
            margin:0;
            font-family:Arial,Helvetica,sans-serif;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
            color:#333;
        }
        .box{
            background:#fff;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
            max-width:450px;
        }
        h2{
            margin-bottom:10px;
        }
        p{
            color:#666;
        }
        a{
            display:inline-block;
            margin-top:20px;
            padding:12px 22px;
            background:#25D366;
            color:#fff;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>📱 Menghubungkan ke WhatsApp...</h2>
    <p>Jika Anda tidak dialihkan secara otomatis dalam beberapa detik, silakan klik tombol di bawah.</p>

    <a id="waBtn" href="#">
        Buka WhatsApp
    </a>
</div>

<script>
    const nomor = "6281523984574";
    const pesan = encodeURIComponent(
        "Halo Admin Babay 👋\n\n" +
        "Saya telah mengakses website Babay sehingga membuka link ini dan berhasil menghubungi Babay.\n\n" +
        "Ada yang ingin saya tanyakan nih 😊"
    );

    document.getElementById("waBtn").href =
        `https://wa.me/${nomor}?text=${pesan}`;
</script>

</body>
</html>
